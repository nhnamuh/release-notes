<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>앱 버전 히스토리</title>

  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      /* dark mode (default) – Figma tokens */
      --surface-level1: #1a1b1f;
      --line-medium:    #2a2d34;
      --label-primary:  #ededed;
      --label-secondary:#d9d9d9;
      --label-tertiary: #848484;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --surface-level1: #ffffff;
        --line-medium:    #e8e9ec;
        --label-primary:  #1a1a1a;
        --label-secondary:#3a3a3a;
        --label-tertiary: #888888;
      }
    }

    /* Explicit override: ?mode=dark / ?mode=light injects data-theme */
    :root[data-theme="dark"] {
      --surface-level1: #1a1b1f;
      --line-medium:    #2a2d34;
      --label-primary:  #ededed;
      --label-secondary:#d9d9d9;
      --label-tertiary: #848484;
    }

    :root[data-theme="light"] {
      --surface-level1: #ffffff;
      --line-medium:    #e8e9ec;
      --label-primary:  #1a1a1a;
      --label-secondary:#3a3a3a;
      --label-tertiary: #888888;
    }

    /* ── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--surface-level1);
      color: var(--label-primary);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
                   "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell ─────────────────────────────────────────────────── */
    .shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      border-left:  1px solid var(--line-medium);
      border-right: 1px solid var(--line-medium);
    }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface-level1);
      border-bottom: 1px solid var(--line-medium);
      height: 48px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .header__back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: var(--label-primary);
    }

    .header__back svg {
      display: block;
    }

    .header__title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.032px;
      color: var(--label-primary);
    }

    /* ── List ──────────────────────────────────────────────────── */
    .list {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .list-item {
      display: flex;
      align-items: stretch;
      padding: 0 16px;
      border-bottom: 1px solid var(--line-medium);
    }

    .list-item__inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 16px 0;
      min-width: 0;
    }

    .list-item__row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .list-item__version {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.028px;
      color: var(--label-secondary);
      white-space: nowrap;
    }

    .list-item__date {
      font-size: 10px;
      font-weight: 400;
      line-height: 1.35;
      letter-spacing: -0.02px;
      color: var(--label-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .list-item__desc {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.35;
      letter-spacing: -0.028px;
      color: var(--label-tertiary);
      word-break: break-word;
    }

    /* ── Empty state ───────────────────────────────────────────── */
    .empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--label-tertiary);
      font-size: 14px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="header">
      <span class="header__back" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <h1 class="header__title">앱 버전 히스토리</h1>
    </header>

    <main class="list" id="list" role="list" aria-label="버전 히스토리 목록">
      <!-- injected by JS -->
    </main>
  </div>

  <script>
    // Apply ?mode=dark / ?mode=light override before render
    (function () {
      const mode = new URLSearchParams(location.search).get('mode');
      if (mode === 'dark' || mode === 'light') {
        document.documentElement.dataset.theme = mode;
      }
    })();

    async function main() {
      const list = document.getElementById('list');

      let data;
      try {
        const res = await fetch('data.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
        if (!Array.isArray(data)) throw new Error('data.json must be an array');
      } catch (e) {
        list.innerHTML = `<div class="empty">데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
        return;
      }

      // Sort: newest date first
      data = data.slice().sort((a, b) => (a.date < b.date ? 1 : -1));

      if (!data.length) {
        list.innerHTML = '<div class="empty">항목이 없습니다.</div>';
        return;
      }

      list.innerHTML = data.map(item => {
        const text = item.desc ?? item.title ?? '';
        return `
          <div class="list-item" role="listitem">
            <div class="list-item__inner">
              <div class="list-item__row">
                <span class="list-item__version">${esc(item.version)}</span>
                <span class="list-item__date">${esc(item.date)}</span>
              </div>
              <p class="list-item__desc">${esc(text)}</p>
            </div>
          </div>`;
      }).join('');
    }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    main();
  </script>
</body>
</html>
